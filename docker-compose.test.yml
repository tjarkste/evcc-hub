services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./deploy/mosquitto/mosquitto.test.conf:/mosquitto/config/mosquitto.conf

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evcc
      POSTGRES_PASSWORD: test
      POSTGRES_DB: evcc_hub_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evcc -d evcc_hub_test"]
      interval: 2s
      timeout: 2s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      MQTT_BROKER_ADDR: "mosquitto:1883"
      JWT_SECRET: test-secret
      DATABASE_URL: "postgres://evcc:test@postgres:5432/evcc_hub_test?sslmode=disable"
      ENV: test
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy

  simulator:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts:/app
    command: node simulator.js
    environment:
      MQTT_BROKER: mqtt://mosquitto:1883
      MQTT_TOPIC: user/test_user_1/site/test_site_1/evcc
    depends_on:
      - mosquitto

per_listener_settings true

# Internal listener for backend (no TLS, Docker network only)
# Must be the first listener — any settings before listener 1 cause
# mosquitto 2.x to create an implicit default listener on 1883.
listener 1883
protocol mqtt
allow_anonymous true

listener 8883
protocol mqtt
certfile /etc/letsencrypt/live/evcc-hub.de/fullchain.pem
keyfile /etc/letsencrypt/live/evcc-hub.de/privkey.pem
require_certificate false
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_http_host backend
auth_opt_http_port 8080
auth_opt_http_getuser_uri /api/mqtt/auth
auth_opt_http_aclcheck_uri /api/mqtt/acl
auth_opt_http_params_mode json

listener 9001
protocol websockets
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_http_host backend
auth_opt_http_port 8080
auth_opt_http_getuser_uri /api/mqtt/auth
auth_opt_http_aclcheck_uri /api/mqtt/acl
auth_opt_http_params_mode json

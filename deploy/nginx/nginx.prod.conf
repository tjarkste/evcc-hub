events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # Docker internal DNS — defers upstream resolution to request time
  resolver 127.0.0.11 valid=30s;

  # HTTP → HTTPS redirect + ACME challenge for cert renewal
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name evcc-hub.de;

    ssl_certificate     /etc/letsencrypt/live/evcc-hub.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evcc-hub.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /legal/ {
      alias /opt/evcc-hub/legal/;
    }

    location /api/ {
      set $backend backend;
      proxy_pass http://$backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /mqtt {
      set $mosquitto mosquitto;
      proxy_pass http://$mosquitto:9001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "8883:8883"
      - "9001:9001"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./deploy/mosquitto/certs:/mosquitto/certs

  backend:
    build: ./backend
    # No host port binding — nginx proxies internally via Docker network
    env_file: .env
    environment:
      MQTT_BROKER_ADDR: "mosquitto:1883"
      DB_PATH: "/data/evcc.db"
      SENTRY_DSN: "${SENTRY_DSN}"
      APP_ENV: "production"
    volumes:
      - ./data:/data
    depends_on:
      - mosquitto
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./web/dist:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /opt/evcc-hub/legal:/opt/evcc-hub/legal:ro
    depends_on:
      - backend
      - mosquitto
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped
